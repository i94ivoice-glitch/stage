<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>94iVoice｜Palantir CEO Alex Karp - Stage</title>
<style>
  body { font-family: -apple-system, sans-serif; background: #0f0f0f; color: #eee; margin: 0; padding: 20px; }
  .container { max-width: 900px; margin: 0 auto; }
  h1 { font-size: 1.4em; color: #fff; border-bottom: 2px solid #333; padding-bottom: 12px; }
  .badge { background: #e63946; color: white; font-size: 0.7em; padding: 3px 8px; border-radius: 4px; vertical-align: middle; margin-left: 8px; }
  .badge.wip { background: #f4a261; }
  video { width: 100%; border-radius: 8px; margin: 16px 0; background: #000; }
  .section { margin: 24px 0; }
  .section h2 { font-size: 1em; color: #aaa; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
  .transcript { background: #1a1a1a; border-radius: 8px; padding: 20px; max-height: 400px; overflow-y: auto; line-height: 1.8; font-size: 0.95em; white-space: pre-wrap; }
  .files a { display: block; padding: 8px 12px; background: #1a1a1a; border-radius: 6px; color: #4ea8de; text-decoration: none; margin: 6px 0; font-size: 0.9em; }
  .files a:hover { background: #252525; }
  .source { background: #1a1a1a; border-radius: 8px; padding: 16px; }
  .source a { color: #4ea8de; }
  .meta { font-size: 0.8em; color: #555; margin-top: 32px; border-top: 1px solid #222; padding-top: 12px; }
</style>
</head>
<body>
<div class="container">
  <h1>Palantir CEO Alex Karp × a16z Summit <span class="badge wip">製作中</span></h1>

  <div class="section">
    <h2>📺 原始影片</h2>
    <div class="source">
      <a href="https://youtu.be/Wj6ttdIeBnE" target="_blank">
        🔗 Palantir CEO on Iran, AI Weapons and America's Advantage | a16z American Dynamism Summit (32:26)
      </a>
    </div>
  </div>

  <div class="section">
    <h2>🎬 Stage 影片</h2>
    <p style="color:#555; font-size:0.9em">製作中，尚未產生...</p>
  </div>

  <div class="section">
    <h2>📝 繁體中文逐字稿</h2>
    <div class="transcript" id="transcript">載入中...</div>
  </div>

  <div class="section">
    <h2>📁 素材檔案</h2>
    <div class="files">
      <a href="transcript_zh.txt">📄 逐字稿（繁中 TXT）</a>
      <a href="script_zh.html">✍️ 播客腳本（改寫版）</a>
      <a href="subtitles_zh.srt">📝 字幕 SRT（繁中）</a>
      <a href="subtitles_en.srt">📝 字幕 SRT（英文）</a>
    </div>
  </div>

  <div class="meta">
    94iVoice Stage｜最後更新：<span id="ts"></span>
    <script>document.getElementById('ts').textContent = new Date().toLocaleString('zh-TW')</script>
  </div>
</div>
<script>
fetch('transcript_zh.txt').then(r=>r.text()).then(t=>{
  document.getElementById('transcript').textContent = t;
}).catch(()=>{
  document.getElementById('transcript').textContent = '無法載入逐字稿';
});
</script>
</body>
</html>
